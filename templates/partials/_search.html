<div class="action-bar">
    <div class="search" role="search" style="flex-direction: row-reverse;">

    <div class="actions" role="toolbar" aria-label="ações">

        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M400-240v-80h160v80H400ZM240-440v-80h480v80H240ZM120-640v-80h720v80H120Z"/></svg>
        <p>Filtrar</p>
      </button>

      <button id="add-open" class="btn primary" type="button" onclick="">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
        <p> {{ label|default:"Nova Tarefa" }}</p>
      </button>
    </div>
  </div>
