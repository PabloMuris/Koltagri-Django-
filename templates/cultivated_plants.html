{%extends 'base.html'%}
{% block title %}Home{% endblock %}
{% load static %}
{% block styles %}
<style>
form {
    height: 40px;
    width: 100%;
}

.search-plants{
    width: 100%;
}

form input{
    background-color: #f2f2f2;
    flex: 1;
    border-top-left-radius: 10px;
    border-bottom-left-radius:  10px;
    padding-left: 14px;
    
}

form button{
    height: 40px;
    width: 40px;
    border-top-right-radius: 10px;
    border-bottom-right-radius:  10px;
    background-color: var(--primary-color);
    
}

.plant-card{
    display: flex;
    width: 150px;
    gap: 6px;
    flex-direction: column;
    height: 160px;
}

.plant-card .text{
    flex: 15;
}

.card__image{
    flex: 85;
    width: 150px;
    border-radius: 10px;
}

.card__image img{
    width: 150px;

    height: 100%;
    border-radius: 10px;
    
}

.search-results{
    display: flex;
    flex-direction: row;
    width: 100%;
}

.filter-button{
    height: 44px;
    width: fit-content;
    padding-inline: 6px;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.filter-button svg{
    fill: black;
}

</style>
{% endblock %}
{% block content %}
<section class="search-plants flex-clmn" style="gap: 20px; ">
<form action="" method="get" class="flex-rw">
  <input
    type="text"
    name="q"
    placeholder="Digite o nome do produto, categoria..."
  >
  <button type="submit"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg></button>
</form>

<div class="filters standard_style">
    <button type="button" class="filter-button flex-rw brdr-10">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M400-240v-80h160v80H400ZM240-440v-80h480v80H240ZM120-640v-80h720v80H120Z"/></svg>
        <p class="text">
            Filtros
        </p>
    </button>
</div>
</section>






<section class="search-results">
    <div class="card plant-card">
        <figure class="card__image">
            <img src="{%static 'example_img/planta.jpeg'%}" alt="" srcset="">
        </figure>
        <div class="card__description">
            <p>Ficus Lirata</p>
        </div>
    </div>
</section>

{% endblock %}
