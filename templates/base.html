    <script src="{% static 'js/base.js'%}"></script>
    <script>
    const adjustSidebar = document.getElementById("adjust-sidebar");
    const body = document.getElementById("body");
    const aside = document.getElementById("aside");
    const navbar = document.getElementById("aside-nav");

    const navLink = navbar.querySelectorAll(".navlink p");
    let opening = false;
    let overlay_aside = false;

    
    window.addEventListener("resize",function(e) {
        if (window.innerWidth<=768){
            if (opening || !opening){
                opening = false;
                mobile_side_menu()
            }

        };

        if(window.innerWidth>768 && !opening){
            reduced_side_menu()
        }

        if(window.innerWidth>=768 &&  opening){
            expanded__side_menu()
        }
    
    });


    adjustSidebar.addEventListener("click",function(e) {
        opening = !opening;

        if(window.innerWidth>=768 && !opening){
            reduced_side_menu()
        }

        if(window.innerWidth>=768 &&  opening){
            expanded__side_menu()
        }

    });

    function mobile_side_menu(){
        // body.style.gridTemplateAreas = `"header" "main" "footer"`;
        body.style.gridTemplateColumns = "1fr";
        body.style.gridTemplateRows = ' 84px 1fr 56px';

        aside.style.display = 'none';

    }

    function reduced_side_menu(){
        // body.style.gridTemplateAreas = `""aside header" "aside main"`;
        body.style.gridTemplateColumns = " 80px 1fr";
        body.style.gridTemplateRows = '84px 1fr auto';


        aside.style.display = 'flex';
        aside.style.width= '80px';

        navbar.style.width = "80px"

        navLink.forEach( p => {
            p.style.display = none;
        })
    }

    function expanded__side_menu(){
        // body.style.gridTemplateAreas = `""aside header" "aside main"`;
        body.style.gridTemplateColumns = " 240px 1fr";
        body.style.gridTemplateRows = '84px 1fr auto';


        aside.style.display = 'flex';
        aside.style.width = '240px';

        navbar.style.width = "240px";

        navLink.forEach( p => {
            p.style.display = flex;
        })
        
    }




</script>
