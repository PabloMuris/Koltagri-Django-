{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Koltagri</title>
        <link rel="stylesheet" href="{%static 'css/base/base.css'%}" />
        {% block rels %}{% endblock %} {% block styles %}{% endblock %}
        <style>

            *{
                font-family: "Outfit", sans-serif;
            }

            :root{
                --secondary-color: #003845;
            }
            #search-input {
                height: 100%;
                text-decoration: none;
                border: none;
            }
            #adjust-sidebar {
                height: 44px;
                width: 44px;
                position: absolute;
                bottom: 24px;
                left: 15px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #adjust-sidebar svg {
                fill: var(--primary-color);
                height: 30px;
                width: 30px;
            }

            aside {
                position: relative;
            }

            @keyframes MenuRetract {
                0% {
                    width: 240px;
                    display: flex;
                }
                100% {
                    width: 74px;
                    display: flex;
                }
            }

            @keyframes MenuExpand {
                0% {
                    width: 74px;
                    display: flex;
                }
                100% {
                    width: 240px;
                    display: flex;
                }
            }

            .expand-animation {
                animation: MenuExpand 0.25s linear;
            }

            .retract-animation {
                animation: MenuRetract 0.25s linear;
            }

            .delay {
                animation-delay: 0.2s;
            }

            header {
                z-index: 1;
            }
            aside {
                z-index: 998;
            }

            .js-aside-nav-label {
                margin: 0;
                white-space: nowrap;
                overflow: hidden;
                transition: max-width 240ms ease, opacity 160ms ease,
                    transform 180ms ease;
                display: inline-block;
                vertical-align: middle;
            }

            aside:not(.expanded) .js-aside-nav-label {
                max-width: 0;
                opacity: 0;
                transform: translateX(-6px);
                visibility: hidden;
                pointer-events: none;
            }

            aside.expanded .js-aside-nav-label {
                max-width: 300px;
                opacity: 1;
                transform: translateX(0);
                visibility: visible;
                pointer-events: auto;
            }

            @media (max-width: 768px) {
                body {
                    grid-template-areas:
                        "header"
                        "main"
                        "footer";
                    grid-template-columns: 1fr;
                    grid-template-rows: 84px 1fr 56px;
                }
                aside {
                    display: none;
                }
                .js-aside-nav-label {
                    display: none !important;
                }
            }
        </style>

        <link rel="stylesheet" href="{% static 'core/css/base.css'%}" />
    </head>

        {% block scripts%}{% endblock %}
        <script src="{% static 'js/base.js'%}"></script>

        <script>
            const adjustSidebar = document.getElementById("adjust-sidebar");
            const body = document.getElementById("body");
            const aside = document.getElementById("aside");
            const navbar = document.getElementById("aside-nav");
            const footer = document.getElementById("footer");

            const navLabels = navbar
                ? navbar.querySelectorAll(".js-aside-nav-label")
                : [];

            let opening = false;

            function initSidebarState() {
                if (window.innerWidth <= 768) {
                    opening = false;
                    mobile_side_menu();
                } else {
                    opening = false;
                    aside.classList.remove("expanded");
                    aside.classList.remove("expand-animation", "retract-animation");
                    body.style.gridTemplateColumns = "74px 1fr";
                    body.style.gridTemplateRows = "84px 1fr auto";
                    aside.style.width = "74px";
                    if (navbar) navbar.style.width = "74px";
                }
            }

            window.addEventListener("resize", function () {
                if (window.innerWidth <= 768) {
                    opening = false;
                    mobile_side_menu();
                } else {
                    if (!opening) reduced_side_menu();
                }
            });

            if (adjustSidebar) {
                adjustSidebar.addEventListener("click", function () {
                    opening = !opening;

                    if (window.innerWidth >= 768 && !opening) {
                        reduced_side_menu();
                    }

                    if (window.innerWidth >= 768 && opening) {
                        expanded__side_menu();
                    }

                    if (window.innerWidth < 768) {
                        if (!opening) {
                            mobile_side_menu();
                        } else {
                            aside.style.display = "flex";
                            body.style.gridTemplateColumns = "1fr";
                            body.style.gridTemplateRows = "84px 1fr 56px";
                        }
                    }
                });
            }

            function mobile_side_menu() {
                body.style.gridTemplateColumns = "1fr";
                body.style.gridTemplateRows = "84px 1fr 56px";

                aside.style.display = "none";
                if (navbar) {
                    navbar.classList.remove("retract-animation", "expand-animation");
                }
                aside.classList.remove("retract-animation", "expand-animation");
                aside.classList.remove("expanded");
            }

            function reduced_side_menu() {
                aside.classList.remove("expand-animation");
                navbar.classList.remove("expand-animation");

                navbar.classList.add("retract-animation");
                if (navbar) navbar.style.width = "74px";

                setTimeout(() => {
                    aside.classList.add("retract-animation");
                    aside.style.width = "74px";
                }, 120);

                setTimeout(() => {
                    body.style.gridTemplateColumns = "74px 1fr";
                    body.style.gridTemplateRows = "84px 1fr auto";
                }, 300);

                aside.classList.remove("expanded");

                aside.style.display = "flex";
                if (navbar) navbar.style.display = "flex";
            }

            function expanded__side_menu() {
                aside.classList.add("expand-animation");
                aside.classList.remove("retract-animation");
                aside.classList.add("expanded");

                body.style.gridTemplateColumns = "240px 1fr";
                body.style.gridTemplateRows = "84px 1fr auto";

                navbar.classList.add("expand-animation");
                navbar.classList.remove("retract-animation");

                aside.style.display = "flex";
                aside.style.width = "240px";
                if (navbar) navbar.style.width = "240px";
                if (navbar) navbar.style.display = "flex";
            }

            document.addEventListener("DOMContentLoaded", initSidebarState);
            initSidebarState();
        </script>
    </body>
</html>
