{%extends 'base.html'%}
{% block title %}Home{% endblock %}
{% load static %}
{% block styles %}
<style>

:root{

    --step-size:32px;
    --steps: 2;
    --progress-width: calc( ((var(--steps) - 1) / var(--steps)) * 100% );
}
    form h1{
    text-align: center;
    margin-bottom: 16px;
}

.form-wizard{
    background-color: #fff;
    padding: 32px ;
    border-radius: 10px;
    width: min(600px, 100%);
    border: 2px solid #f2f2f2;
}

.progress-container{
    position: relative;
}

.progress-container::before{
    content: "";
    height: 4px;
    width: var(--progress-width);
    background-color: #e0e0e0;
    position: absolute;
    top: calc(var(--step-size) / 2);
    translate: 50% 50%;
    z-index: 0;
    
}

.progress-container ol{
    list-style-type: none;
    display: flex;
    justify-content: flex-start;
    justify-content: space-between;
    counter-reset: step-number;
    position: relative;
    z-index: 999;
}

.progress-container li{
    flex: 1;
    display: flex;
    flex-direction: column ;
    align-items: center;
    gap: 8px;
    color: #7e7e7e;
}

.progress-container li::before{
    counter-increment: step-number;
    content: counter(step-number);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 32px;
    width: 32px;
    border-radius: 50%;
    background-color: var(--primary-color);
    color: #fff;
    margin-bottom: 8px;
    
}

.form-wizard select{
    height: 40px;
    border-radius: 5px;
    padding-left: 10px;
    background-color: #f2f2f2;
    
}
.form-wizard .partial{
    margin-top: 24px;
}

.form-wizard label{
    margin-bottom: 10px;
    margin-top: 10px;
}

.form-wizard input{
    background-color: #f2f2f2;
    height: 36px;
    border-radius: 5px;
    padding-left: 10px;
}
</style>
{% endblock %}

{% block content %}
 <form action="" method="post" class="form-wizard">
    {%csrf_token%}
            <h1 style="font-weight: 500; color: #253447;">Cadastro de cultivo</h1>

            <div class="species-and-local flex-clmn partial">
                <label for="sites">Locais</label>
                <select name="sites" id="sites">
                    <option value="TD">Toda a propriedade</option>
                    <option value="margem">Margem</option>
                    <option value="afloramento rochoso">Afloramento rochoso</option>
                    <option value="uva">Vale</option> 
                </select>
                <label for="species">Espécie</label>
                <select name="species" id="species">
                    <option value="TD">Milho</option>
                    <option value="margem">Arroz</option>
                    <option value="afloramento rochoso">Adenium</option>
                    <option value="uva">Uva</option> 
                </select>

            </div>

            <div class="special-dates flex-clmn partial">
                <label for="sites">Plantio</label>
                <input type="date" name="seed" id="">
                <label for="sites">Transplante(opcional)</label>
                <input type="date" name="seed" id="">
                <label for="sites">Cultivo</label>
                <input type="date" name="seed" id="">

            </div>

            <button type="submit" style="height: 44px; color: var(--primary-color); width: 100%; margin-top: 40px; border-radius: 5px;">
                Concluir
            </button>

        </form>
{% endblock %}
