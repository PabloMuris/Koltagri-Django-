{% extends 'base.html' %}
{% block title %}Plantas{% endblock %}
{% load static %}

{% block styles %}
<style>
:root {
  --primary-color: #2b8aef;
  --bg-color: #f7f9fb;
  --card-radius: 12px;
  --border-color: #f2f2f2;
  --gap: 18px;
  --transition: 0.18s ease;
}

/* página */


/* cabeçalho (busca + ações) */
.header-bar{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.search-form{
  display:flex;
  align-items:center;
  width:100%;
  max-width:640px;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(0,0,0,0.06);
}
.search-form input{
  flex:1;
  padding:10px 14px;
  border:0;
  outline:0;
  font-size:15px;
  background:transparent;
}
.search-form button{
  width:56px;
  height:44px;
  border:0;
  background:var(--primary-color);
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* action buttons */
.action-buttons{ display:flex; gap:10px; flex-wrap:wrap; }
.action-button{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid transparent;
  background:var(--primary-color);
  color:#fff;
  cursor:pointer;
  transition:var(--transition);
}
.action-button:hover{ transform:translateY(-2px); }


.plant-grid{
  display:grid;
  gap:var(--gap);
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  align-items:start;
  width: 100%;
}

 
.plant-card{
  display:flex;
  flex-direction:column;
  background:#fff;
  border:1px solid var(--border-color);
  border-radius:var(--card-radius);
  overflow:hidden;
  cursor:pointer;
  transition: transform 0.14s ease, border-color 0.14s ease;
}

/* hover sutil (sem sombra) */
.plant-card:hover{ transform: translateY(-4px); border-color: rgba(43,138,239,0.12); }

/* imagem responsiva: mantém proporção e preenche a largura do card */
.card__image{
  width:100%;
  aspect-ratio: 4 / 3; /* mantém proporção em todos os navegadores modernos */
  overflow:hidden;
  background:#f3f3f3;
  display:block;
}
.card__image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* descrição adaptável */
.card__description{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:10px 12px;
  min-height:48px;
  box-sizing:border-box;
}
.card__description .title{
  font-size:15px;
  font-weight:600;
  color:#102734;
  margin:0;
}
.card__description .meta{
  font-size:13px;
  color:#6b777a;
  white-space:nowrap;
  opacity:0.9;
}


@media (max-width:880px){
  .search-form{ max-width:100%; }
  .action-buttons{ width:100%; justify-content:flex-start; }
}
@media (max-width:520px){
  .card__description{ padding:10px; min-height:56px; }
  .card__description .title{ font-size:14px; }
}


.plant-grid.grid-large{
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
}
</style>
{% endblock %}

{% block content %}

  <div class="header-bar">
    <form class="search-form" role="search" method="get">
      <input type="text" name="q" placeholder="Pesquisar planta..." aria-label="Pesquisar">
      <button type="submit" aria-label="Pesquisar">
       
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 -960 960 960" fill="currentColor"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56Z"/></svg>
      </button>
    </form>

    <div class="action-buttons">
      <a class="action-button" href="#" role="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 -960 960 960" fill="currentColor"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
        Criar
      </a>
      <button class="action-button" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 -960 960 960" fill="currentColor"><path d="M400-240v-80h160v80H400ZM240-440v-80h480v80H240ZM120-640v-80h720v80H120Z"/></svg>
        Filtrar
      </button>
    </div>
  </div>

  <section class="plant-grid">
    <article class="plant-card" onclick="location.href='#'">
      <div class="card__image">
        <img src="{% static 'example_img/ananas.jpeg' %}" alt="Banana Nanica">
      </div>
      <div class="card__description">
        <p class="title">Banana Nanica</p>
        <span class="meta">Musa spp.</span>
      </div>
    </article>

    <article class="plant-card" onclick="location.href='#'">
      <div class="card__image">
        <img src="{% static 'example_img/laranja.jpeg' %}" alt="Laranjeira">
      </div>
      <div class="card__description">
        <p class="title">Laranjeira</p>
        <span class="meta">Citrus sinensis</span>
      </div>
    </article>

    <article class="plant-card" onclick="location.href='#'">
      <div class="card__image">
        <img src="{% static 'example_img/maracuja.jpeg' %}" alt="Maracujá">
      </div>
      <div class="card__description">
        <p class="title">Maracujá</p>
        <span class="meta">Passiflora edulis</span>
      </div>
    </article>

    <!-- mais cards de exemplo -->
    <article class="plant-card" onclick="location.href='#'">
      <div class="card__image">
        <img src="{% static 'example_img/banana.png' %}" alt="Banana da Terra">
      </div>
      <div class="card__description">
        <p class="title">Banana da Terra</p>
        <span class="meta">Musa × paradisiaca</span>
      </div>
    </article>

  </section>

{% endblock %}
