{% load static%}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Koltagri</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css'%}">
</head>
<body>
    <div class="login-container">
        <div class="login-image">
            <h1>Koltagri</h1>
            <p>Bem-vindo de volta! Faça login para acessar sua conta.</p>
        </div>

        <div class="login-form">
            <div class="form-header">
                <h2>Fazer Login</h2>
                <p>Entre com suas credenciais para acessar o sistema</p>
            </div>

            <form id="login-form">
                <div class="form-row">
                <div class="form-row">
                    <div class="form-control">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                        <div class="error-message">Por favor, insira um e-mail válido</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-control">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="Sua senha" required>
                        <div class="error-message">Por favor, insira sua senha</div>
                    </div>
                </div>

                <div class="login-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Lembrar-me</label>
                    </div>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn primary" id="login-btn" onclick="location.href='{% url 'business_board' %}'">
                        <span class="material-icons">login</span>
                        <a style="color: white; text-decoration: none;" href="{% url 'index'%}">Entrar</a>
                    </button>
                </div>
            </form>

            <div class="divider">
                <span>ou</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn google">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <button type="button" class="social-btn facebook">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>

            <div class="signup-link">
                Não tem uma conta? <a href="{% url 'register'%}">Cadastre-se agora</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('login-btn');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (validateForm()) {
                    loginBtn.disabled = true;
                    loginBtn.innerHTML = '<span class="material-icons">hourglass_empty</span> Entrando...';
                    
                    setTimeout(function() {
                        alert('Login realizado com sucesso! Redirecionando...');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<span class="material-icons">login</span> Entrar';
                    }, 1500);
                }
            });


            function validateForm() {
                let isValid = true;
                
                if (!emailInput.value.trim() || !isValidEmail(emailInput.value)) {
                    markFieldInvalid(emailInput);
                    isValid = false;
                } else {
                    markFieldValid(emailInput);
                }
                

                if (!passwordInput.value || passwordInput.value.length < 6) {
                    markFieldInvalid(passwordInput);
                    isValid = false;
                } else {
                    markFieldValid(passwordInput);
                }
                
                return isValid;
            }

            // Email validation
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            // Mark field as invalid
            function markFieldInvalid(field) {
                field.parentElement.classList.add('error');
            }

            // Mark field as valid
            function markFieldValid(field) {
                field.parentElement.classList.remove('error');
            }

            // Real-time validation
            emailInput.addEventListener('blur', function() {
                if (!this.value.trim() || !isValidEmail(this.value)) {
                    markFieldInvalid(this);
                } else {
                    markFieldValid(this);
                }
            });

            passwordInput.addEventListener('blur', function() {
                if (!this.value || this.value.length < 6) {
                    markFieldInvalid(this);
                } else {
                    markFieldValid(this);
                }
            });

            document.querySelector('.social-btn.google').addEventListener('click', function() {
                alert('Login com Google selecionado. Em uma implementação real, isso redirecionaria para o OAuth do Google.');
            });

            document.querySelector('.social-btn.facebook').addEventListener('click', function() {
                alert('Login com Facebook selecionado. Em uma implementação real, isso redirecionaria para o OAuth do Facebook.');
            });

            document.querySelector('.forgot-password').addEventListener('click', function(e) {
                e.preventDefault();
                alert('Funcionalidade de recuperação de senha. Em uma implementação real, isso abriria um modal ou redirecionaria para a página de recuperação.');
            });
        });
    </script>
</body>
</html>
