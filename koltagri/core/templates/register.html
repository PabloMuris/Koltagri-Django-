{% load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Quintessential&display=swap');

        :root{
    --primary-color: #509377;
    --background-icons-color: #f2f2f2;   
}


*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  border: 0;
}

/* Força herança de fontes e line-height mais previsível */
html, body {
  height: 100%;
  font-family: inherit;
  line-height: 1.15;
  font-family: "Outfit", sans-serif;
}

/* Remove listas, citações, tabelas estilos padrões */
ol, ul {
  list-style: none;
}
blockquote, q {
  quotes: none;
}
blockquote::before, blockquote::after,
q::before, q::after {
  content: "";
  content: none;
}
table {
  border-collapse: collapse;
  border-spacing: 0;
}


/* PAGE STYLE*/
body{
    display: flex;
    flex-flow: row;
    align-items: center;
    padding: 40px 36px;
    gap: 10%;
}

aside{

    background-image: url("{% static 'core/img/agri.webp'%}");
    background-repeat: no-repeat;
    border-radius: 10px;
}

main,aside{
    max-height: 80%;
    height: 80%;
    flex: 1;

}

@media(min-width:0px) and (max-width:800px){
    aside{
        display: none;
    }
}



main{
    display: flex;
    flex-direction: column;
    height: 100%;
    gap: 10%;
}




.main-top{
    display: flex;
    align-items: center;
    flex-flow: column;
    margin-bottom: 40px;
}



figure{
    border-radius: 100%;
    background-color: #f2f2f2;
    margin-bottom: 20px;
}



    </style>
</head>
<body>
    <aside style="height: 90%; width: 50%; background-color: #509377;">

    </aside>
    <main>
        <div class="main-top">
            <figure>
                <img src="{% static 'core/img/logo.png'%}" alt="" srcset="">
            </figure>
            <h1 style="font-size: 22px; font-weight: 500;">KOLTAGRI</h1>
        </div>
        <form action="" method="post" class="form-wizard">
            
        </form>
        
    </main>
</body>
</html>
